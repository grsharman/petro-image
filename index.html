<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSeaDragon Split View Example</title>
    <style>
        body, html {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }
        #viewer-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        #viewer1, #viewer2 {
            position: absolute;
            top: 0;
            bottom: 0;
            height: 100%;
            width: 50%;
        }
        #viewer1 {
            left: 0;
        }
        #viewer2 {
            right: 0;
        }
        #divider {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: black;
            cursor: ew-resize;
        }
        #annotation-menu {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border: 1px solid black;
        }
        .annotation {
            position: absolute;
            background: rgba(255, 0, 0, 0.5);
            border-radius: 50%;
            width: 10px;
            height: 10px;
            pointer-events: none;
        }
        .annotation-label {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid black;
            padding: 2px;
            font-size: 12px;
            pointer-events: none;
        }
        #coordinates-right {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 5px;
            border: 1px solid black;
            font-size: 14px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OpenSeadragonScalebar/2.0.0/openseadragon-scalebar.min.css" />
</head>
<body>
    <div id="annotation-menu">
        <button id="annotate-button">Annotate</button>
        <input type="text" id="annotation-text" placeholder="Annotation text">
    </div>
    <div id="viewer-container">
        <div id="viewer1"></div>
        <div id="viewer2"></div>
        <div id="divider"></div>
        <div id="coordinates">Coordinates: (x, y)</div>
    </div>
    <script src="js/openseadragon.min.js"></script>
    <script src="js/openseadragon-scalebar.min.js"></script>
    <script>
        var viewer1 = OpenSeadragon({
            id: "viewer1",
            prefixUrl: "js/images/",
            tileSources: "https://raw.githubusercontent.com/grsharman/petro-image/main/images/O48-013.dzi"
        });

        var viewer2 = OpenSeadragon({
            id: "viewer2",
            prefixUrl: "js/images/",
            tileSources: "https://raw.githubusercontent.com/grsharman/petro-image/main/images/O48-014.dzi"
        });

        function synchronizeViewers(master, slave) {
            master.addHandler('animation', function() {
                var masterCenter = master.viewport.getCenter();
                var masterZoom = master.viewport.getZoom();
                slave.viewport.panTo(masterCenter, true);
                slave.viewport.zoomTo(masterZoom, null, true);
            });

            master.addHandler('resize', function() {
                slave.viewport.viewportToImageRectangle(master.viewport.getBounds(true));
            });
        }

        synchronizeViewers(viewer1, viewer2);
        synchronizeViewers(viewer2, viewer1);

        var divider = document.getElementById('divider');
        var viewerContainer = document.getElementById('viewer-container');

        viewerContainer.addEventListener('mousemove', function(event) {
            var width = viewerContainer.clientWidth;
            var mouseX = event.clientX;
            var leftWidth = mouseX;
            var rightWidth = width - mouseX;

            viewer1.style.width = leftWidth + 'px';
            viewer2.style.width = rightWidth + 'px';
            viewer2.style.left = leftWidth + 'px';
            divider.style.left = mouseX + 'px';
        });

        viewerContainer.addEventListener('mouseleave', function(event) {
            viewer1.style.width = '50%';
            viewer2.style.width = '50%';
            viewer2.style.left = '50%';
            divider.style.left = '50%';
        });

        // Adding scalebar to viewer1
        viewer1.scalebar({
            type: OpenSeadragon.ScalebarType.MAP,
            pixelsPerMeter: 100000, // Adjust according to your image
            minWidth: "75px",
            location: OpenSeadragon.ScalebarLocation.BOTTOM_LEFT,
            xOffset: 10,
            yOffset: 10,
            stayInsideImage: true,
            color: "black",
            fontColor: "black",
            backgroundColor: "rgba(255, 255, 255, 0.5)",
            fontSize: "small",
            barThickness: 2
        });

        // Adding scalebar to viewer2
        viewer2.scalebar({
            type: OpenSeadragon.ScalebarType.MAP,
            pixelsPerMeter: 100000, // Adjust according to your image
            minWidth: "75px",
            location: OpenSeadragon.ScalebarLocation.BOTTOM_LEFT,
            xOffset: 10,
            yOffset: 10,
            stayInsideImage: true,
            color: "black",
            fontColor: "black",
            backgroundColor: "rgba(255, 255, 255, 0.5)",
            fontSize: "small",
            barThickness: 2
        });

        var annotateMode = false;
        var annotateButton = document.getElementById('annotate-button');
        var annotationText = document.getElementById('annotation-text');

        annotateButton.addEventListener('click', function() {
            annotateMode = !annotateMode;
            annotateButton.textContent = annotateMode ? 'Annotate Mode: ON' : 'Annotate Mode: OFF';
        });

        function addAnnotation(viewer, point, text, id) {
            var annotation = document.createElement('div');
            annotation.className = 'annotation';
            annotation.id = id;

            var label = document.createElement('div');
            label.className = 'annotation-label';
            label.textContent = text;
            annotation.appendChild(label);

            viewer.addOverlay({
                element: annotation,
                location: point
            });
        }

        function synchronizeAnnotations(point, text) {
            var id = 'annotation-' + Date.now();
            addAnnotation(viewer1, point, text, id);
            addAnnotation(viewer2, point, text, id);
        }

        function handleAnnotation(event, viewer) {
            if (!annotateMode) return;
            var point = viewer.viewport.pointFromPixel(event.position);
            var text = annotationText.value || "Annotation";
            synchronizeAnnotations(point, text);
        }

        viewer1.addHandler('canvas-click', function(event) {
            handleAnnotation(event, viewer1);
        });

        viewer2.addHandler('canvas-click', function(event) {
            handleAnnotation(event, viewer2);
        });

        // Coordinates display
        var coordinatesDisplay = document.getElementById('coordinates');

        function updateCoordinates(viewer, event, displayElement) {
            var point = viewer.viewport.pointFromPixel(event.position);
            var imagePoint = viewer.viewport.viewportToImageCoordinates(point);
            displayElement.textContent = 'Coordinates: (' + imagePoint.x.toFixed(2) + ', ' + imagePoint.y.toFixed(2) + ')';
        }

        function showCoordinates() {
            coordinatesDisplay.style.display = 'block';
        }

        function hideCoordinates() {
            coordinatesDisplay.style.display = 'none';
        }

        function handleCanvasHover(viewer, event) {
            updateCoordinates(viewer, event, coordinatesDisplay);
        }

        viewer1.addHandler('canvas-enter', showCoordinates);
        viewer1.addHandler('canvas-exit', hideCoordinates);
        viewer1.addHandler('canvas-hover', function(event) {
            handleCanvasHover(viewer1, event);
        });

        viewer2.addHandler('canvas-enter', showCoordinates);
        viewer2.addHandler('canvas-exit', hideCoordinates);
        viewer2.addHandler('canvas-hover', function(event) {
            handleCanvasHover(viewer2, event);
        });

        // Show coordinates box initially
        showCoordinates();
    </script>
</body>
</html>
